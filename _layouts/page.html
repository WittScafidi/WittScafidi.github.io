---
layout: default
---

<section class="page-banner">
  <div class="container">
    <div class="page-breadcrumb">
      <a href="/">&#8592; Home</a>
      <span class="breadcrumb-sep">/</span>
      <span>{{ page.title }}</span>
    </div>
    <h1 class="page-banner-title">{{ page.heading | default: page.title }}</h1>
    {% if page.subtitle %}<p class="page-banner-sub">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

{{ content }}
